[pytest]
# Omnix Playwright Testing Framework configuration
testpaths = e2e api integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    smoke: Quick smoke tests (page load, element checks)
    api: API endpoint tests (Flask test client)
    frontend: Frontend unit tests (JS evaluation via Playwright)
    js_analysis: Static JavaScript analysis
    e2e: End-to-end browser tests

# Default options
addopts =
    -v
    --tb=short
    --strict-markers

# Playwright defaults
base_url = http://localhost:5000
